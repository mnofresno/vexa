# Container profiles — declarative templates for container types.
# Each profile defines the image, resources, timeouts, and defaults.
# Hot-reload: send SIGHUP to the runtime-api process after editing.
#
# No fallback defaults. If an env var is missing, the profile must fail
# visibly — not silently use :latest or localhost.

profiles:
  # Meeting bot — Playwright browser for meeting transcription
  # Lifetime: managed by meeting-api (scheduler max_bot_time + bot-side timers)
  meeting:
    image: "${BROWSER_IMAGE}"
    command: ["/app/vexa-bot/entrypoint.sh"]
    working_dir: "/app/vexa-bot"
    resources:
      # 2026-04-26: Zoom Web bot was demanding ~3.2 cores due to a
      # software gpu-process (357% of one bot's 440% total CPU) running
      # SwiftShader + canvas compositing. 2026-04-27: adding the Chromium
      # flag --in-process-gpu (services/vexa-bot/core/src/constans.ts)
      # collapsed that work into the renderer and per-bot demand dropped
      # to ~115% — back inside the original 1500m budget that matches
      # the prior gmeet/teams p95 (780m). Restoring those original
      # numbers; the brief 4000m / 2500m bump was an emergency
      # compensation while the gpu-process bug was unidentified.
      cpu_request: "1000m"     # measured p95: 780m (load test 2026-04-15, 19 bots)
      cpu_limit: "1500m"       # 1.5x headroom for browser spikes
      memory_request: "1100Mi" # measured p95: 977Mi (load test 2026-04-15, 19 bots)
      # Bumped 1536Mi → 2560Mi (Bug B 2026-04-21): Teams bot bursts memory
      # during admission-verification + graceful leave. Exit 137 observed
      # on helm meetings 9+10 + compose 18 after 10-20s active. 2.5× headroom
      # absorbs Teams-side memory spikes without affecting bot scheduling.
      memory_limit: "2560Mi"
      shm_size: 2147483648     # 2GB shared memory for browser
    idle_timeout: 0          # managed by meeting-api (scheduler + bot-side timers)
    auto_remove: false
    env:
      DISPLAY: "${DISPLAY:-:99}"
      NODE_ENV: "production"
      REDIS_URL: "${REDIS_URL}"
      TRANSCRIPTION_SERVICE_URL: "${TRANSCRIPTION_SERVICE_URL}"
      TRANSCRIPTION_SERVICE_TOKEN: "${TRANSCRIPTION_SERVICE_TOKEN}"
      TTS_SERVICE_URL: "${TTS_SERVICE_URL}"
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET}"
    ports:
      "9222/tcp": {}         # CDP debug port

  # Browser session — persistent Chrome with VNC/CDP
  # Lifetime: gateway heartbeats /touch on every /b/{token}/* request + periodic while WS open
  browser-session:
    image: "${BROWSER_IMAGE}"
    command: ["/app/vexa-bot/entrypoint.sh"]
    working_dir: "/app/vexa-bot"
    resources:
      cpu_request: "1000m"     # same as meeting bot
      cpu_limit: "1500m"
      memory_request: "1100Mi"
      memory_limit: "1536Mi"
      shm_size: 2147483648     # 2GB shared memory for browser
    idle_timeout: 3600       # 1h — gateway /touch keeps alive while connected
    auto_remove: false
    env:
      DISPLAY: "${DISPLAY:-:99}"
      NODE_ENV: "production"
      REDIS_URL: "${REDIS_URL}"
      TTS_SERVICE_URL: "${TTS_SERVICE_URL}"
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET}"
    ports:
      "9222/tcp": {}         # CDP debug port

  # Claude Code agent — runs Claude CLI for interactive AI sessions
  # Lifetime: agent-api heartbeats via /touch
  agent:
    image: "${AGENT_IMAGE}"
    command: ["sleep", "infinity"]
    resources:
      cpu_request: "500m"
      cpu_limit: "2000m"
      memory_request: "512Mi"
      memory_limit: "2Gi"
    idle_timeout: 300         # 5 minutes — agent-api must /touch to keep alive
    auto_remove: false
    env:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    mounts: []
