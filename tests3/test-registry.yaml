  # ── v0.10.6 Pack U — audio recording unification ─────────────
  # Single-invocation multi-step scripts: each runs all its step IDs in
  # one matrix run, emits one JSON with the steps array. Same pattern as
  # containers.sh / webhooks.sh. The earlier (R7) attempt registered
  # them with `steps: [...]` and the script expected $1 — that's the
  # old per-step pattern from v0.10.5.3-static-greps.sh which was never
  # actually wired into the matrix. R8 rewrite: scripts orchestrate all
  # steps internally; one test-registry entry per script.
  v0.10.6-static-greps:
