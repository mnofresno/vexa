# Default values for the Vexa Helm chart.
# This chart is designed for LOCAL development builds:
#   - imagePullPolicy defaults to IfNotPresent
#   - images default to DockerHub repos with :dev tag
#   - Override tags with specific YYMMDD-HHMM timestamps for traceability

global:
  imageTag: ""              # When set, overrides all service image tags
  imagePullPolicy: Always
  imagePullSecrets: []
  clusterDomain: cluster.local

  # Common pod-level knobs (override per component if you want)
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podSecurityContext: {}
  # Hardened defaults (load-tested): block privilege escalation and drop
  # all Linux capabilities. Images run as non-root via their Dockerfile
  # USER directives. Override per-component if a specific workload needs
  # a capability back (unusual — flag in review).
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

# Shared secrets (recommended: override via --set-file or external secret tooling)
secrets:
  existingSecretName: ""
  adminApiToken: "CHANGE_ME"   # Used by Admin API auth & MeetingToken signing across services
  transcriptionServiceToken: ""
  internalApiSecret: ""        # Shared secret for gateway↔admin-api internal calls (defaults to "vexa-internal-secret")
  vexaApiKey: ""               # Pre-provisioned API key for dashboard proxy (optional, create via admin API)

# Shared database config (used by admin-api, meeting-api, runtime-api)
database:
  host: ""          # auto-filled if postgres.enabled=true, else REQUIRED
  port: 5432
  name: "vexa"
  user: "postgres"
  password: "postgres"
  sslMode: "disable"

# Shared redis config
redisConfig:
  url: ""           # auto-filled if redis.enabled=true, else REQUIRED
  host: ""
  port: 6379

# ---------- Components ----------

apiGateway:
  enabled: true
  # Default 2 so `maxSurge: 0` rolling updates remain zero-downtime for the
  # front door. See _helpers.tpl vexa.deploymentStrategy and DoD
  # chart-api-gateway-ha-replica-count.
  replicaCount: 2
  image:
    repository: vexaai/api-gateway
    tag: dev
  mcpUrl: ""
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  extraEnv: []

adminApi:
  enabled: true
  # v0.10.5 Pack I — stateless services default to replicaCount: 2 + PDB
  # for production-shape availability. Pairs with `vexa.deploymentStrategy`
  # helper (maxSurge: 0) so rollouts stay zero-downtime.
  replicaCount: 2
  image:
    repository: vexaai/admin-api
    tag: dev
  service:
    type: ClusterIP
    port: 8001
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Connection-pool sizing — explicit so the sum of configured ceilings
  # across services stays well under the managed-DB slot cap (incident-doc
  # §4 + N-8). Matches the asyncpg / SQLAlchemy pool knobs each service
  # reads from its database.py.
  extraEnv:
    - name: DB_POOL_SIZE
      value: "10"
    - name: DB_MAX_OVERFLOW
      value: "5"
    - name: DB_POOL_TIMEOUT
      value: "10" 

meetingApi:
  enabled: true
  # v0.10.5 Pack I — stateless service default replicaCount: 2 + PDB.
  replicaCount: 2
  image:
    repository: vexaai/meeting-api
    tag: dev
  service:
    type: ClusterIP
    port: 8080
  recordingEnabled: "true"
  storageBackend: minio
  botImageName: "vexaai/vexa-bot:latest"
  transcriptionServiceUrl: ""
  transcriptionServiceToken: ""
  minioSecure: "false"
  # v0.10.5.3 Pack D-3 follow-up (Option B): browser-reachable hostname
  # used to sign presigned download URLs. MINIO_ENDPOINT (cluster-internal)
  # stays for server-side I/O. Empty default → falls back to MINIO_ENDPOINT
  # (correct for dev clusters where the dashboard runs in-cluster, and for
  # compose/lite where the same hostname resolves externally via published
  # ports). Set this on production helm deployments where MinIO is
  # ClusterIP-only — typical value: `http://<lke-node-ip>:<minio.service.nodePort>`
  # OR `https://minio.<your-domain>` when fronted by an ingress.
  minioPublicEndpoint: ""
  logLevel: "INFO"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Connection-pool sizing for the meeting-api → Postgres path. Defaults
  # tuned against a single-node LKE smoke run; raise for heavier traffic.
  # Names match the asyncpg pool knobs read by meeting_api/database.py.
  extraEnv:
    - name: DB_POOL_SIZE
      value: "20"
    - name: DB_MAX_OVERFLOW
      value: "20"
    - name: DB_POOL_TIMEOUT
      value: "10"

runtimeApi:
  enabled: true
  # v0.10.5 Pack I — runtime-api can run replicaCount: 2 in `kubernetes`
  # orchestrator mode (the K8s backend is stateless beyond Redis, which IS
  # the source of truth for container state). For `process`/`docker` modes
  # (bots run on the same node as runtime-api), keep at 1 — operator sets
  # replicaCount: 1 in their values overlay if needed.
  replicaCount: 2
  orchestrator: "process"       # "process" (default), "kubernetes" (K8s pods), or "docker"
  browserImage: ""              # Bot container image (defaults to meetingApi image if empty)
  image:
    repository: vexaai/runtime-api
    tag: dev
  service:
    type: ClusterIP
    port: 8090
  profilesPath: "/app/profiles.yaml"
  # ConfigMap name holding the profiles.yaml mounted at profilesPath. Without
  # this set, the pod falls back to the baked-in demo profiles from the image
  # and every POST /containers {profile: "meeting"} returns 400 "Unknown
  # profile: meeting". Keep this set for any real deployment.
  profilesConfigMap: "vexa-runtime-profiles"
  logLevel: "INFO"
  # Load-tested shape (from proprietary wrapper staging values): runtime-api
  # is a thin dispatcher — lean requests, modest cpu limit for spikes.
  resources:
    requests:
      cpu: 20m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi
  # Connection-pool sizing — explicit so the sum of configured ceilings
  # across services stays well under the managed-DB slot cap (incident-doc
  # §4 + N-8). Matches the asyncpg / SQLAlchemy pool knobs each service
  # reads from its database.py.
  extraEnv:
    - name: DB_POOL_SIZE
      value: "10"
    - name: DB_MAX_OVERFLOW
      value: "5"
    - name: DB_POOL_TIMEOUT
      value: "10" 

ttsService:
  enabled: true
  replicaCount: 1
  image:
    repository: vexaai/tts-service
    tag: dev
  service:
    type: ClusterIP
    port: 8002
  apiToken: ""
  logLevel: "INFO"
  defaultVoices: "major"
  loadVoices: "en_US-amy-medium,en_US-danny-low,pt_BR-faber-medium,es_ES-davefx-medium"
  preloadStrict: true
  persistence:
    size: 5Gi
    storageClassName: ""
  # The image runs as uid/gid 999. The voices PVC must be group-writable on
  # first boot so Piper can download voice models before readiness turns green.
  podSecurityContext:
    fsGroup: 999
    fsGroupChangePolicy: OnRootMismatch
  # Load-tested shape (from proprietary wrapper staging values): TTS is
  # bursty — lean cpu request, bigger memory for voice cache.
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: 1000m
      memory: 1536Mi
  extraEnv: []
  # First-boot voice-model download takes 60-180s. Defaults below clear that
  # window; subsequent restarts come up fast (PVC retains models). Operators
  # on slow registries / first-boot in air-gapped envs should bump these.
  # Caught 2026-05-03 on prod cluster: original 15s/45s defaults killed pod
  # in download-loop until v0.10.6.1 exposed the values knobs.
  readinessProbe:
    initialDelaySeconds: 300
  livenessProbe:
    initialDelaySeconds: 600

mcp:
  enabled: true
  # v0.10.5.3 Pack H — bump from 1 to 2 to match other stateless services
  # (apiGateway, adminApi, meetingApi, runtimeApi, dashboard) and enable
  # zero-downtime rolling-update with the maxSurge: 1 / maxUnavailable: 0
  # strategy. Single-replica was a v0.10.5.2 outage source.
  replicaCount: 2
  image:
    repository: vexaai/mcp
    tag: dev
  service:
    type: ClusterIP
    port: 18888
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  extraEnv: []

dashboard:
  enabled: false
  # v0.10.5 Pack I — stateless service default replicaCount: 2 + PDB
  # (when dashboard is enabled in operator values).
  replicaCount: 2
  image:
    repository: vexaai/dashboard
    tag: dev
  service:
    type: ClusterIP
    port: 3000
  # env:
  #   ENABLE_AZURE_AD_AUTH: "true"
  #   NEXTAUTH_URL: ""
  env:
    # Default-refuse: dashboard direct login (passwordless via /api/auth/send-magic-link
    # without SMTP) is disabled unless an operator explicitly opts in. Override to
    # "true" only in dev/test profiles (see values-test.yaml).
    VEXA_ALLOW_DIRECT_LOGIN: "false"
  extraEnv: []
  extraSecretName: ""
  extraSecretEnv: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: ""
    tls: []

migrations:
  enabled: false
  backoffLimit: 3
  image:
    repository: ""
    tag: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ---------- Optional bundled dependencies (for dev) ----------

pgbouncer:
  # Optional transaction-mode connection pooler in front of Postgres.
  # Default off. Flip to `enabled: true` when:
  #   - running against managed external Postgres (postgres.enabled=false)
  #     with a fixed slot budget (Aiven, RDS, Cloud SQL, …);
  #   - scaling any service beyond replicaCount=1;
  #   - operating a production deployment where configured pool ceilings
  #     might sum past the server's max_connections under load.
  # When enabled, the chart rewires every service's DB_HOST to point at
  # pgbouncer via the `vexa.dbHostEffective` helper. See incident post-mortem
  # 2026-04-21-db-pool-exhaustion.md §4-A + N-5.
  enabled: false
  image: edoburu/pgbouncer:latest
  replicaCount: 1
  poolMode: transaction
  defaultPoolSize: 20
  maxClientConn: 1000
  serverResetQuery: "DISCARD ALL"
  authType: scram-sha-256
  adminUsers: postgres
  service:
    port: 5432
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

postgres:
  enabled: true
  image: postgres:17-alpine
  credentialsSecretName: postgres-credentials
  # idle_in_transaction_session_timeout (ms) — Postgres auto-kills connections
  # that hold a transaction open past this threshold. Defense-in-depth against
  # DB session leaks in meeting-api (see services/meeting-api/meeting_api/database.py).
  idleInTransactionTimeoutMs: 60000
  service:
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 4000m
      memory: 4Gi

redis:
  enabled: true
  image: redis:7-alpine
  service:
    port: 6379
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""
  # Memory cap + eviction policy. Without these, Redis grows unbounded
  # until the pod OOMs — which kills WebSocket pub/sub, transcription
  # segments, and session state simultaneously. Default policy drops
  # the least-recently-used keys (safe for all Vexa-side usages).
  maxmemory: "1gb"
  maxmemoryPolicy: "allkeys-lru"
  # v0.10.5 Pack C.5 — Durability paired invariant (#267 + 2026-04-21
  # redis-storage-cascade incident). AOF is per-write durability; BGSAVE
  # is the snapshot. With AOF on, BGSAVE failures don't risk write-loss
  # so we let them be non-blocking (`stopWritesOnBgsaveError: no`). The
  # _helpers.tpl `vexa.validateRedisDurability` enforces the invariant:
  # if you set stopWritesOnBgsaveError=yes WITHOUT appendonly=yes, render
  # fails with `required` — refuses to ship the unsafe combination.
  durability:
    appendonly: "yes"               # per-write append-only file
    appendfsync: "everysec"         # fsync once per second (balanced durability/perf)
    stopWritesOnBgsaveError: "no"   # don't block writes on snapshot failure
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

minio:
  enabled: true
  image:
    repository: minio/minio
    tag: latest
  accessKey: vexa-access-key
  secretKey: vexa-secret-key
  bucket: vexa
  persistence:
    size: 10Gi
    storageClassName: ""
  service:
    # v0.10.5.3 Pack D-3 follow-up (Option B): set type=NodePort + nodePort
    # to expose MinIO browser-side for presigned-URL audio fetches. Then
    # set meetingApi.minioPublicEndpoint to "http://<node-ip>:<nodePort>".
    # Default ClusterIP keeps MinIO internal-only (safer for prod clusters
    # with ingress fronting); switch to NodePort for dev clusters.
    type: ClusterIP
    port: 9000
    nodePort: ""
  # Proprietary wrapper values leave minio at the OSS default (no override),
  # so the OSS default itself must be cpu-limit-complete. 500m matches the
  # api-gateway / admin-api shape — storage services are typically IO-bound,
  # cpu is a burst-absorb knob, not a sustained workload.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ---------- Ingress (optional; exposes api-gateway by default) ----------
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: "vexa.local"
  tls: []
  paths:
    - path: /
      pathType: Prefix
      service: api-gateway
      servicePort: 8000

# ──────────────────────────────────────────────────────────────────────
# runtime-api container profiles — mounted as ConfigMap into the pod
# when runtimeApi.profilesConfigMap is non-empty.
#
# Mirrors the vexa-platform production profiles; override in your own
# values file if you need different resource envelopes.
# ──────────────────────────────────────────────────────────────────────
# v0.10.5 Pack B.3 — recording / storage configuration block.
# Centralizes recording + storage knobs that runtime-api propagates
# to bot pods via runtimeProfiles env substitution. Pre-Pack-B these
# were scattered (RECORDING_ENABLED on meetingApi only; bots silently
# unconfigured per #235).
recording:
  enabled: true
  storageBackend: "minio"   # "minio" | "s3"
  minioSecure: false

runtimeProfiles: |
  profiles:
    meeting:
      image: "${BROWSER_IMAGE}"
      command: ["/app/vexa-bot/entrypoint.sh"]
      working_dir: "/app/vexa-bot"
      resources:
        cpu_request: "1000m"     # measured p95: 780m
        cpu_limit: "1500m"       # 1.5x headroom for browser spikes
        memory_request: "1100Mi"
        memory_limit: "2560Mi"  # bumped 2026-04-21 (Bug B Teams OOM)
        shm_size: 2147483648
      idle_timeout: 0
      auto_remove: false
      # v0.10.5 Pack B.2 — bot pod scheduling per #240. Empty defaults
      # ship without operator config; operators with dedicated bot
      # pools override `runtimeProfiles` in their values overlay to
      # populate `node_selector` and `k8s_overrides.tolerations`.
      # Schema (services/runtime-api/runtime_api/profiles.py:65,67)
      # accepts both fields; backend (kubernetes.py:131,141) applies them.
      node_selector: {}
      k8s_overrides:
        tolerations: []
      env:
        DISPLAY: "${DISPLAY:-:99}"
        NODE_ENV: "production"
        REDIS_URL: "${REDIS_URL}"
        TRANSCRIPTION_SERVICE_URL: "${TRANSCRIPTION_SERVICE_URL}"
        TRANSCRIPTION_SERVICE_TOKEN: "${TRANSCRIPTION_SERVICE_TOKEN}"
        TTS_SERVICE_URL: "${TTS_SERVICE_URL}"
        # v0.10.5 Pack B.3 — propagate recording/storage env to bot pods (#235).
        # Without these, bot transcribes (has TRANSCRIPTION_SERVICE_*) and
        # silently skips recording upload (no MEETING_API_URL → no endpoint
        # for /internal/recordings/upload). Prod evidence on #235: prod
        # MinIO 0 objects despite real-time transcripts flowing normally.
        MEETING_API_URL: "${MEETING_API_URL}"
        RECORDING_ENABLED: "${RECORDING_ENABLED:-true}"
        STORAGE_BACKEND: "${STORAGE_BACKEND:-minio}"
        MINIO_ENDPOINT: "${MINIO_ENDPOINT}"
        MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
        MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
        MINIO_BUCKET: "${MINIO_BUCKET:-vexa}"
        MINIO_SECURE: "${MINIO_SECURE:-false}"
      ports:
        "9222/tcp": {}
    browser-session:
      image: "${BROWSER_IMAGE}"
      command: ["/app/vexa-bot/entrypoint.sh"]
      working_dir: "/app/vexa-bot"
      resources:
        cpu_request: "1000m"
        cpu_limit: "1500m"
        memory_request: "1100Mi"
        memory_limit: "2560Mi"
        shm_size: 2147483648
      idle_timeout: 0
      auto_remove: false
      # v0.10.5 Pack B.2 — same scheduling extension point.
      node_selector: {}
      k8s_overrides:
        tolerations: []
      env:
        DISPLAY: "${DISPLAY:-:99}"
        NODE_ENV: "production"
        REDIS_URL: "${REDIS_URL}"
        TTS_SERVICE_URL: "${TTS_SERVICE_URL}"
        # v0.10.5 Pack B.3 — recording/storage env propagation.
        MEETING_API_URL: "${MEETING_API_URL}"
        RECORDING_ENABLED: "${RECORDING_ENABLED:-true}"
        STORAGE_BACKEND: "${STORAGE_BACKEND:-minio}"
        MINIO_ENDPOINT: "${MINIO_ENDPOINT}"
        MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
        MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
        MINIO_BUCKET: "${MINIO_BUCKET:-vexa}"
        MINIO_SECURE: "${MINIO_SECURE:-false}"
      ports:
        "6080/tcp": {}
        "9222/tcp": {}
        "9223/tcp": {}

# ──────────────────────────────────────────────────────────────────────
# PodDisruptionBudgets (optional, off by default)
#
# Enables minAvailable guarantees on services that matter for availability
# during node drain (LKE maintenance, auto-upgrade, manual `kubectl drain`).
# Off by default so `helm install` on a single-node dev cluster doesn't
# block drains. Flip to `enabled: true` per-service on multi-node clusters.
# ──────────────────────────────────────────────────────────────────────
# v0.10.5 Pack I — stateless services default to PDB enabled (paired
# with replicaCount: 2 above). State-bearing services (redis, postgres,
# minio, pgbouncer) stay disabled — they have replicaCount: 1 by design;
# a PDB minAvailable: 1 with replicaCount: 1 blocks `kubectl drain`
# indefinitely.
podDisruptionBudgets:
  apiGateway:
    enabled: true
    minAvailable: 1
  adminApi:
    enabled: true
    minAvailable: 1
  meetingApi:
    enabled: true
    minAvailable: 1
  runtimeApi:
    enabled: true
    minAvailable: 1
  dashboard:
    enabled: true
    minAvailable: 1
  redis:
    enabled: false        # state-bearing single-replica; don't block drains
    minAvailable: 1
