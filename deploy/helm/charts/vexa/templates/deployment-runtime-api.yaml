{{- if .Values.runtimeApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vexa.componentName" (list . "runtime-api") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.runtimeApi.replicaCount }}
  {{- include "vexa.deploymentStrategy" . | nindent 2 }}
  selector:
    matchLabels:
      {{- include "vexa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runtime-api
  template:
    metadata:
      labels:
        {{- include "vexa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runtime-api
      annotations:
        {{- toYaml .Values.global.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq (default "process" .Values.runtimeApi.orchestrator) "kubernetes" }}
      serviceAccountName: {{ include "vexa.componentName" (list . "runtime-api") }}
      {{- end }}
      containers:
        - name: runtime-api
          securityContext:
            {{- toYaml .Values.global.securityContext | nindent 12 }}
          image: "{{ .Values.runtimeApi.image.repository }}:{{ .Values.global.imageTag | default .Values.runtimeApi.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8090
          env:
            - name: REDIS_URL
              value: {{ include "vexa.redisUrl" . | quote }}
            - name: DB_HOST
              value: {{ include "vexa.dbHostEffective" . | quote }}
            - name: DB_PORT
              value: {{ include "vexa.dbPortEffective" . | quote }}
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.postgresCredentialsSecretName" . | quote }}
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.postgresCredentialsSecretName" . | quote }}
                  key: POSTGRES_USER
            - name: DB_SSL_MODE
              value: {{ .Values.database.sslMode | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.postgresCredentialsSecretName" . | quote }}
                  key: POSTGRES_PASSWORD
            {{- if .Values.minio.enabled }}
            - name: MINIO_ENDPOINT
              value: "{{ include "vexa.componentName" (list . "minio") }}:{{ .Values.minio.service.port }}"
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.accessKey | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.secretKey | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            {{- else }}
            - name: MINIO_ENDPOINT
              value: {{ .Values.runtimeApi.minioEndpoint | default "" | quote }}
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.runtimeApi.minioAccessKey | default "" | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.runtimeApi.minioSecretKey | default "" | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.runtimeApi.minioBucket | default "vexa" | quote }}
            {{- end }}
            - name: ORCHESTRATOR_BACKEND
              value: {{ .Values.runtimeApi.orchestrator | default "process" | quote }}
            - name: ALLOW_PRIVATE_CALLBACKS
              value: "true"
            - name: BROWSER_IMAGE
              value: {{ .Values.runtimeApi.browserImage | default (printf "%s:%s" .Values.meetingApi.image.repository .Values.meetingApi.image.tag) | quote }}
            {{- if eq (default "process" .Values.runtimeApi.orchestrator) "kubernetes" }}
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_SERVICE_ACCOUNT
              value: {{ include "vexa.componentName" (list . "runtime-api") | quote }}
            - name: K8S_IMAGE_PULL_POLICY
              value: {{ .Values.global.imagePullPolicy | quote }}
            {{- end }}
            - name: TRANSCRIPTION_SERVICE_URL
              value: {{ .Values.meetingApi.transcriptionServiceUrl | default "" | quote }}
            - name: TRANSCRIPTION_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: TRANSCRIPTION_SERVICE_TOKEN
            - name: TTS_SERVICE_URL
              value: "http://{{ include "vexa.componentName" (list . "tts-service") }}:{{ .Values.ttsService.service.port }}"
            # v0.10.5 Pack B.3 — runtime-api needs MEETING_API_URL +
            # RECORDING_ENABLED + STORAGE_BACKEND + MINIO_SECURE on its own
            # env so profile-load-time `${VAR}` substitution resolves the
            # values into bot pods' env (#235). meeting-api/redis/minio
            # vars (above) cover the storage trio; these add the missing.
            - name: MEETING_API_URL
              value: "http://{{ include "vexa.componentName" (list . "meeting-api") }}:{{ .Values.meetingApi.service.port | default 8080 }}"
            - name: RECORDING_ENABLED
              value: {{ .Values.recording.enabled | default true | quote }}
            - name: STORAGE_BACKEND
              value: {{ .Values.recording.storageBackend | default "minio" | quote }}
            - name: MINIO_SECURE
              value: {{ .Values.recording.minioSecure | default false | quote }}
            - name: PROFILES_PATH
              value: {{ .Values.runtimeApi.profilesPath | default "/app/profiles.yaml" | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.runtimeApi.logLevel | default "INFO" | quote }}
            {{- with .Values.runtimeApi.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          {{- if .Values.runtimeApi.profilesConfigMap }}
          volumeMounts:
            - name: profiles
              mountPath: /app/profiles.yaml
              subPath: profiles.yaml
          {{- end }}
          resources:
            {{- toYaml .Values.runtimeApi.resources | nindent 12 }}
      {{- if .Values.runtimeApi.profilesConfigMap }}
      volumes:
        - name: profiles
          configMap:
            name: {{ .Values.runtimeApi.profilesConfigMap }}
      {{- end }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
