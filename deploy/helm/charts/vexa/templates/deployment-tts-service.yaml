{{- if .Values.ttsService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vexa.componentName" (list . "tts-service") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ttsService.replicaCount }}
  # TTS uses Recreate (not the default RollingUpdate) because its PVC for
  # voice models cannot be mounted by two pods; a maxSurge > 0 rollout
  # would stall.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "vexa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tts-service
  template:
    metadata:
      labels:
        {{- include "vexa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tts-service
      annotations:
        {{- toYaml .Values.global.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml (mergeOverwrite (deepCopy .Values.global.podSecurityContext) .Values.ttsService.podSecurityContext) | nindent 8 }}
      # v0.10.5 Pack I.s — stateful-pod anti-affinity (#272 iter-5).
      # See deployment-minio.yaml header for the full rationale.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values: [postgres, redis, minio]
                topologyKey: kubernetes.io/hostname
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tts-service
          securityContext:
            {{- toYaml .Values.global.securityContext | nindent 12 }}
          image: "{{ .Values.ttsService.image.repository }}:{{ .Values.global.imageTag | default .Values.ttsService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8002
          env:
            - name: TTS_API_TOKEN
              value: {{ .Values.ttsService.apiToken | default "" | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.ttsService.logLevel | default "INFO" | quote }}
            - name: PIPER_DEFAULT_VOICES
              value: {{ .Values.ttsService.defaultVoices | default "major" | quote }}
            - name: PIPER_LOAD_VOICES
              value: {{ .Values.ttsService.loadVoices | default "en_US-amy-medium,en_US-danny-low,pt_BR-faber-medium,es_ES-davefx-medium" | quote }}
            - name: PIPER_PRELOAD_STRICT
              value: {{ .Values.ttsService.preloadStrict | default true | quote }}
            {{- with .Values.ttsService.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: voices
              mountPath: /app/voices
          # First-boot voice-model download takes 60-180s (en_US-amy-medium ~60MB
          # pulled into the persistent volume on first start). Initial delays
          # are values-overridable so prod / on-prem can extend them; defaults
          # tuned to clear the first download. Subsequent restarts come up fast
          # because the PVC retains models.
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: {{ .Values.ttsService.readinessProbe.initialDelaySeconds | default 300 }}
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: {{ .Values.ttsService.livenessProbe.initialDelaySeconds | default 600 }}
            periodSeconds: 20
          resources:
            {{- toYaml .Values.ttsService.resources | nindent 12 }}
      volumes:
        - name: voices
          persistentVolumeClaim:
            claimName: {{ include "vexa.componentName" (list . "tts-voices") }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
